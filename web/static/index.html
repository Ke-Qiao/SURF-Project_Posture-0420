<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SURF Posture Demo</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>SURF Posture Demo</h1>
      </div>
      <span id="statusBadge" class="status-badge">Ready</span>
    </header>

    <main class="layout">
      <section class="controls" aria-label="Input controls">
        <div class="segmented" role="tablist" aria-label="Input mode">
          <button class="mode-button active" type="button" data-mode="webcam">Webcam</button>
          <button class="mode-button" type="button" data-mode="image">Image</button>
          <button class="mode-button" type="button" data-mode="video">Video</button>
          <button class="mode-button" type="button" data-mode="batch">Batch</button>
        </div>

        <div id="webcamPanel" class="mode-panel active">
          <button id="startWebcam" class="primary-button" type="button">Start camera</button>
          <button id="stopWebcam" class="secondary-button" type="button">Stop</button>
          <button id="captureWebcamSet" class="secondary-button" type="button">Capture / Download</button>
          <div id="webcamCaptureStatus" class="inline-status">0/10 captured</div>
        </div>

        <div id="imagePanel" class="mode-panel">
          <label class="file-picker">
            <span>Choose image</span>
            <input id="imageInput" type="file" accept="image/*">
          </label>
          <button id="analyzeImage" class="primary-button" type="button">Analyze image</button>
        </div>

        <div id="videoPanel" class="mode-panel">
          <label class="file-picker">
            <span>Choose video</span>
            <input id="videoInput" type="file" accept="video/*">
          </label>
          <button id="playVideo" class="primary-button" type="button">Analyze video</button>
        </div>

        <div id="batchPanel" class="mode-panel">
          <label class="field-label" for="teacherSource">Teacher image library</label>
          <select id="teacherSource" class="select-input">
            <option value="">Do not include</option>
            <option value="all">All teacher images</option>
            <option value="train">Teacher train images</option>
            <option value="val">Teacher val images</option>
          </select>
          <label class="file-picker">
            <span>Choose images/videos</span>
            <input id="batchInput" type="file" accept="image/*,video/*" multiple>
          </label>
          <button id="analyzeBatch" class="primary-button" type="button">Analyze batch</button>
          <a id="downloadBatch" class="secondary-link" href="#" hidden>Download batch ZIP</a>
        </div>

        <button id="downloadEvidence" class="secondary-button evidence-button" type="button" disabled>Download evidence</button>
      </section>

      <section class="viewer" aria-label="Annotated preview">
        <div class="viewer-header">
          <span id="modeLabel">Webcam</span>
          <div class="legend" aria-label="Overlay legend">
            <span><i class="legend-skeleton"></i>Skeleton</span>
            <span><i class="legend-keypoint"></i>Side points</span>
            <span><i class="legend-reference"></i>Plumb line</span>
          </div>
        </div>
        <div class="frame">
          <img id="previewImage" alt="Annotated posture preview">
          <video id="previewVideo" controls muted playsinline></video>
          <div id="emptyState" class="empty-state">Select an input mode</div>
        </div>
        <div id="analysisFooter" class="analysis-footer">
          <div class="footer-main">
            <strong id="footerPosture">Waiting for input</strong>
            <span id="footerMeta">Score - / Side -</span>
          </div>
          <div id="footerAngles" class="footer-angles"></div>
          <div id="footerAdvice" class="footer-advice"></div>
        </div>
      </section>

      <aside class="metrics" aria-label="Posture metrics">
        <div class="metric-row">
          <span>Posture</span>
          <strong id="postureValue">-</strong>
        </div>
        <div class="metric-row">
          <span>Score</span>
          <strong id="scoreValue">-</strong>
        </div>
        <div class="metric-row">
          <span>Side</span>
          <strong id="sideValue">-</strong>
        </div>
        <div id="angleList" class="angle-list"></div>
        <div id="adviceList" class="advice-list"></div>
      </aside>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
